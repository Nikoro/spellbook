name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  quality-gates:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Run quality gates
        run: scripts/check.sh
      - name: Run E2E tests
        run: scripts/e2e.sh

  build-arm64:
    needs: quality-gates
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build release binary
        run: swift build -c release
      - name: Prepare artifact
        run: |
          binary="$(swift build -c release --show-bin-path)/spells"
          cp "$binary" spells-macos-arm64
          shasum -a 256 spells-macos-arm64 > spells-macos-arm64.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: spells-macos-arm64
          path: |
            spells-macos-arm64
            spells-macos-arm64.sha256

  release:
    needs: build-arm64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: spells-macos-arm64
          path: artifacts/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/spells-macos-arm64 \
            artifacts/spells-macos-arm64.sha256
