opt_in_rules:
  - force_unwrapping

line_length:
  warning: 120
  error: 120
  ignores_comments: false
  ignores_urls: true

file_length:
  warning: 200
  error: 200
  ignore_comment_only_lines: false

function_body_length:
  warning: 30
  error: 30

function_parameter_count:
  warning: 4
  error: 4

cyclomatic_complexity:
  warning: 10
  error: 10

type_body_length:
  warning: 200
  error: 200

nesting:
  type_level: 3
  function_level: 3

force_cast: error
force_try: error
force_unwrapping: error

excluded:
  - .build
  - .swiftpm
  - Tests/SpellbookTests/__Snapshots__
  - Tests/SpellbookTests/Fixtures
